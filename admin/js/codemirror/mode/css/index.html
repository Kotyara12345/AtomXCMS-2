<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMirror: CSS mode</title>
    <link rel="stylesheet" href="../../lib/codemirror.css">
    <link rel="stylesheet" href="../../doc/docs.css">
    <style>
        .CodeMirror {
            background: #f8f8f8;
        }
    </style>
</head>
<body>
    <header>
        <h1>CodeMirror: CSS mode</h1>
    </header>
    <main>
        <form>
            <textarea id="code" name="code" aria-label="CSS code editor">
/* Some example CSS */

@import url("something.css");

body {
  margin: 0;
  padding: 3em 6em;
  font-family: tahoma, arial, sans-serif;
  color: #000;
}

#navigation a {
  font-weight: bold;
  text-decoration: none !important;
}

h1 {
  font-size: 2.5em;
}

h2 {
  font-size: 1.7em;
}

h1:before, h2:before {
  content: "::";
}

code {
  font-family: courier, monospace;
  font-size: 80%;
  color: #418A8A;
}
            </textarea>
        </form>
        <p><strong>MIME types defined:</strong> <code>text/css</code>.</p>
        <p><strong>Parsing/Highlighting Tests:</strong> 
            <a href="../../test/index.html#css_*">normal</a>,  
            <a href="../../test/index.html#verbose,css_*">verbose</a>.
        </p>
    </main>
    <script src="../../lib/codemirror.js" defer></script>
    <script src="css.js" defer></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var editor = CodeMirror.fromTextArea(document.getElementById("code"), {});
        });
    </script>
</body>
</html>
