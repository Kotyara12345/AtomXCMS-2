<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMirror: SCSS mode</title>
    <link rel="stylesheet" href="../../lib/codemirror.css">
    <link rel="stylesheet" href="../../doc/docs.css">
    <style>
        .CodeMirror {
            background: #f8f8f8;
        }
    </style>
</head>
<body>
    <header>
        <h1>CodeMirror: SCSS mode</h1>
    </header>
    <main>
        <form>
            <textarea id="code" name="code" aria-label="SCSS code editor">
/* Some example SCSS */

@import "compass/css3";
$variable: #333;

$blue: #3bbfce;
$margin: 16px;

.content-navigation {
  #nested {
    background-color: black;
  }
  border-color: $blue;
  color: darken($blue, 9%);
}

.border {
  padding: $margin / 2;
  margin: $margin / 2;
  border-color: $blue;
}

@mixin table-base {
  th {
    text-align: center;
    font-weight: bold;
  }
  td, th {padding: 2px}
}

table.hl {
  margin: 2em 0;
  td.ln {
    text-align: right;
  }
}

li {
  font: {
    family: serif;
    weight: bold;
    size: 1.2em;
  }
}

@mixin left($dist) {
  float: left;
  margin-left: $dist;
}

#data {
  @include left(10px);
  @include table-base;
}

.source {
  @include flow-into(target);
  border: 10px solid green;
  margin: 20px;
  width: 200px;
}

.new-container {
  @include flow-from(target);
  border: 10px solid red;
  margin: 20px;
  width: 200px;
}

body {
  margin: 0;
  padding: 3em 6em;
  font-family: tahoma, arial, sans-serif;
  color: #000;
}

@mixin yellow() {
  background: yellow;
}

.big {
  font-size: 14px;
}

.nested {
  @include border-radius(3px);
  @extend .big;
  p {
    background: whitesmoke;
    a {
      color: red;
    }
  }
}

#navigation a {
  font-weight: bold;
  text-decoration: none !important;
}

h1 {
  font-size: 2.5em;
}

h2 {
  font-size: 1.7em;
}

h1:before, h2:before {
  content: "::";
}

code {
  font-family: courier, monospace;
  font-size: 80%;
  color: #418A8A;
}
            </textarea>
        </form>
        <p><strong>MIME types defined:</strong> <code>text/scss</code>.</p>
        <p><strong>Parsing/Highlighting Tests:</strong> 
            <a href="../../test/index.html#scss_*">normal</a>,  
            <a href="../../test/index.html#verbose,scss_*">verbose</a>.
        </p>
    </main>
    <script src="../../lib/codemirror.js" defer></script>
    <script src="css.js" defer></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var editor = CodeMirror.fromTextArea(document.getElementById("code"), {
                lineNumbers: true,
                matchBrackets: true,
                mode: "text/x-scss"
            });
        });
    </script>
</body>
</html>
